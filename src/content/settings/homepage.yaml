  subheadline: >-
    Schnell, sauber und über eine einfache Editor-Oberfläche selbst pflegbar —
    ganz ohne Agentur-Wartezeit.
  ctaLabel: Kontakt aufnehmen
  ctaHref: /kontakt/
  image: ../../assets/homepage/hero/image.jpg
sections:
